{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2>Restablecer contraseña</h2>
    <div id="error-msg" class="alert alert-error" style="display: none;"></div>
    <div id="success-msg" class="alert alert-success" style="display: none;"></div>

    <form id="reset-password-form">
        <input type="hidden" id="token" value="{{ token }}">

        <div class="form-group">
            <label>Nueva contraseña</label>
            <input type="password" id="new_password" required>
        </div>
        <button type="submit">Actualizar contraseña</button>
    </form>
    <p><a href="/">Volver al inicio de sesión</a></p>
</div>

<script>
    document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            token: document.getElementById('token').value,
            new_password: document.getElementById('new_password').value
        };

        try {
            const response = await fetch('/auth/password-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (response.ok) {
                document.getElementById('success-msg').innerText = result.msg || 'Contraseña actualizada correctamente.';
                document.getElementById('success-msg').style.display = 'block';
                document.getElementById('error-msg').style.display = 'none';
                setTimeout(() => { window.location.href = '/'; }, 2500);
            } else {
                document.getElementById('error-msg').innerText = result.detail || 'No se pudo actualizar la contraseña.';
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('success-msg').style.display = 'none';
            }
        } catch (error) {
            document.getElementById('error-msg').innerText = 'Error de red. Intenta de nuevo.';
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }
    });
</script>
{% endblock %}
