{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2>Recuperar Contraseña</h2>
    <div id="error-msg" class="alert alert-error" style="display: none;"></div>
    <div id="success-msg" class="alert alert-success" style="display: none;"></div>

    <form id="reset-request-form">
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit">Enviar enlace de restablecimiento</button>
    </form>
    <p>¿Recordaste tu contraseña? <a href="/">Iniciar sesión</a></p>
</div>

<script>
    document.getElementById('reset-request-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = { email: document.getElementById('email').value };

        try {
            const response = await fetch('/auth/password-reset-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (response.ok) {
                document.getElementById('success-msg').innerText = result.msg || 'Se ha enviado el enlace si el correo existe en el sistema.';
                document.getElementById('success-msg').style.display = 'block';
                document.getElementById('error-msg').style.display = 'none';
            } else {
                document.getElementById('error-msg').innerText = result.detail || 'No se pudo solicitar el restablecimiento, intenta de nuevo.';
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('success-msg').style.display = 'none';
            }
        } catch (error) {
            document.getElementById('error-msg').innerText = 'Error de red. Intenta de nuevo.';
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }
    });
</script>
{% endblock %}
